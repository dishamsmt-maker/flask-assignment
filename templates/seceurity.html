{% extends "base.html" %}
{% block content %}
<div class="max-w-2xl mx-auto p-10 bg-white shadow-lg rounded-2xl mt-12">
    <h2 class="text-2xl font-bold text-slate-800 border-b pb-4">ตั้งค่าความปลอดภัย</h2>
    <form action="/security" method="POST" class="mt-8 space-y-6">
        <div>
            <label class="block text-sm font-medium text-gray-700">รหัสผ่านปัจจุบัน</label>
            <input type="password" name="current_password" class="mt-1 block w-full px-4 py-3 bg-gray-50 border border-gray-300 rounded-lg focus:ring-red-500 focus:border-red-500" placeholder="••••••••" required>
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700">รหัสผ่านใหม่</label>
            <input type="password" name="new_password" class="mt-1 block w-full px-4 py-3 bg-gray-50 border border-gray-300 rounded-lg focus:ring-red-500 focus:border-red-500" placeholder="••••••••" required>
        </div>
        <button type="submit" class="w-full py-3 px-4 bg-red-600 hover:bg-red-700 text-white font-bold rounded-lg transition-colors">
            อัปเดตรหัสผ่าน
        </button>
    </form>
</div>
{% endblock %}
