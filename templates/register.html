{% extends "base.html" %}
{% block content %}
<div class="flex items-center justify-center min-h-[80vh] py-10">
    <div class="bg-white p-10 rounded-xl shadow-lg w-full max-w-md border border-gray-100">
        <h2 class="text-3xl font-bold text-center text-slate-800 mb-8">สมัครสมาชิกใหม่</h2>
        <form action="/register" method="POST" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700">ชื่อ-นามสกุล</label>
                <input type="text" name="fullname" class="mt-1 block w-full px-4 py-3 bg-gray-50 border border-gray-300 rounded-lg focus:ring-green-500 focus:border-green-500" placeholder="Full Name" required>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">ชื่อผู้ใช้งาน (Username)</label>
                <input type="text" name="username" class="mt-1 block w-full px-4 py-3 bg-gray-50 border border-gray-300 rounded-lg focus:ring-green-500 focus:border-green-500" placeholder="Username" required>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">อีเมล</label>
                <input type="email" name="email" class="mt-1 block w-full px-4 py-3 bg-gray-50 border border-gray-300 rounded-lg focus:ring-green-500 focus:border-green-500" placeholder="email@example.com" required>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">รหัสผ่าน</label>
                <input type="password" name="password" class="mt-1 block w-full px-4 py-3 bg-gray-50 border border-gray-300 rounded-lg focus:ring-green-500 focus:border-green-500" placeholder="Password" required>
            </div>
            <button type="submit" class="w-full py-3 px-4 bg-green-600 hover:bg-green-700 text-white font-bold rounded-lg transition-colors mt-6">
                สร้างบัญชีผู้ใช้
            </button>
        </form>
        <p class="mt-6 text-center text-sm text-gray-600">
            มีบัญชีอยู่แล้ว? <a href="/login" class="text-blue-600 hover:underline">เข้าสู่ระบบ</a>
        </p>
    </div>
</div>
{% endblock %}
