<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}AI Job Dashboard{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-900">

    <nav class="bg-slate-900 p-4 text-white shadow-md">
        <div class="container mx-auto flex justify-between items-center">
            <a href="/" class="text-xl font-bold tracking-tighter">AI-JOBS.PSU 🤖</a>
            <div class="space-x-6">
                <a href="/" class="hover:text-blue-400 transition">หน้าแรก</a>
                <a href="/jobs" class="hover:text-blue-400 transition">งานทั้งหมด</a>
                <a href="/add-job" class="hover:text-blue-400 transition text-blue-300">+ ลงประกาศ</a>
            </div>
        </div>
    </nav>

    <main class="container mx-auto py-10 px-4">
        {% block content %}{% endblock %}
    </main>

    <footer class="mt-20 border-t py-10 text-center text-gray-500 text-sm">
        &copy; 2026 AI Job Dashboard - Disham Lamchana (PSU)
    </footer>

</body>
</html>
