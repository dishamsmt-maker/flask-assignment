{% extends "base.html" %}
{% block content %}
<div class="max-w-4xl mx-auto p-10 mt-10">
    <div class="text-center mb-10">
        <h2 class="text-3xl font-bold text-slate-800">AI Matching For You</h2>
        <p class="text-gray-500 mt-2">ระบบกำลังวิเคราะห์ทักษะของคุณเพื่อแนะนำงานที่เหมาะสมที่สุด</p>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div class="bg-gradient-to-r from-blue-600 to-indigo-700 p-6 rounded-2xl text-white shadow-xl">
            <div class="flex justify-between items-start">
                <span class="bg-white/20 px-3 py-1 rounded-full text-xs">Match 98%</span>
            </div>
            <h3 class="text-xl font-bold mt-4">Computer Vision Engineer</h3>
            <p class="text-blue-100 text-sm mt-1">เน้นทักษะ YOLO และ Python ที่คุณถนัด</p>
            <button class="mt-6 w-full py-2 bg-white text-blue-700 font-bold rounded-lg hover:bg-gray-100 transition">ดูรายละเอียด</button>
        </div>

        <div class="bg-white p-6 rounded-2xl border-2 border-dashed border-gray-200 shadow-sm">
            <div class="flex justify-between items-start">
                <span class="bg-gray-100 text-gray-600 px-3 py-1 rounded-full text-xs">Match 85%</span>
            </div>
            <h3 class="text-xl font-bold mt-4 text-slate-800">Data Scientist (Intern)</h3>
            <p class="text-gray-500 text-sm mt-1">บริษัทเทคโนโลยีชั้นนำในหาดใหญ่</p>
            <button class="mt-6 w-full py-2 bg-slate-800 text-white font-bold rounded-lg hover:bg-slate-900 transition">สมัครเลย</button>
        </div>
    </div>
</div>
{% endblock %}
